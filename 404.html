<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Talent Hub</title>
    <script>
        // GitHub Pages SPA fallback: redirect 404s back to index with the path encoded
        var path = window.location.pathname;
        var search = window.location.search;
        var hash = window.location.hash;
        // Redirect to index.html preserving the intended URL
        window.location.replace(
            window.location.origin + '/' + 
            path.split('/').slice(1).join('/') + 
            (search ? search : '') + 
            (hash ? hash : '')
        );
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
