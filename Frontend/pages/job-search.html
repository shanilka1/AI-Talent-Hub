<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Talent Hub - Find Jobs</title>
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        .search-bar-container {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        @media (max-width: 768px) {
            .search-bar-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header></header>

    <main>
        <h1>Explore Opportunities</h1>
        <p class="subtitle">Search and apply for jobs suited to your professional background.</p>

        <!-- Search Filters -->
        <div class="card search-bar-container">
            <div style="flex: 2;">
                <label class="form-label" for="search-title">Keywords / Title</label>
                <input type="text" id="search-title" class="form-input" placeholder="e.g. C#, ASP.NET, React">
            </div>
            <div style="flex: 1;">
                <label class="form-label" for="search-location">Location</label>
                <input type="text" id="search-location" class="form-input" placeholder="e.g. Remote, Colombo">
            </div>
            <div style="flex: 1;">
                <label class="form-label" for="search-type">Job Type</label>
                <select id="search-type" class="form-input">
                    <option value="">All Types</option>
                    <option value="Full-Time">Full-Time</option>
                    <option value="Part-Time">Part-Time</option>
                    <option value="Remote">Remote</option>
                    <option value="Hybrid">Hybrid</option>
                </select>
            </div>
            <div style="display: flex; align-items: flex-end;">
                <button class="btn btn-primary" onclick="searchJobs()" style="height: 42px; min-width: 120px;">Search</button>
            </div>
        </div>

        <!-- Job Grid -->
        <div class="grid-3" id="jobs-grid-container">
            <p style="color: var(--text-muted);">Loading job postings...</p>
        </div>
    </main>

    <footer></footer>

    <script src="/services/api.js"></script>
    <script src="/services/auth.js"></script>
    <script src="/services/jobs.js"></script>
    <script src="/components/navbar.js"></script>
    <script src="/components/footer.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadJobsList();
        });

        async function loadJobsList(search = '', location = '', type = '') {
            const container = document.getElementById('jobs-grid-container');
            container.innerHTML = '<p style="color: var(--text-muted);">Searching listings...</p>';

            try {
                const jobs = await jobsService.getAllJobs(search, location, type);
                if (jobs.length === 0) {
                    container.innerHTML = `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
                            <p style="color: var(--text-secondary);">No job listings match your search criteria.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = jobs.map(job => {
                    const date = new Date(job.createdAt).toLocaleDateString();
                    return `
                        <div class="card" style="display: flex; flex-direction: column; height: 100%; margin-bottom: 0;">
                            <span class="badge badge-primary" style="align-self: flex-start; margin-bottom: 0.75rem;">${job.jobType}</span>
                            <h3 style="font-size: 1.2rem; margin-bottom: 0.25rem;">${job.title}</h3>
                            <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 1rem;">${job.companyName} &bull; ${job.location}</p>
                            
                            <p style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1.5rem; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                                ${job.description}
                            </p>
                            
                            <div style="margin-top: auto; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-glass); padding-top: 1rem;">
                                <span style="font-weight: 600; font-size: 0.9rem; color: var(--secondary);">${job.salaryRange || 'Salary: Open'}</span>
                                <a href="/pages/job-details.html?id=${job.id}" class="btn btn-secondary" style="font-size: 0.8rem; padding: 0.4rem 0.8rem;">Details</a>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                container.innerHTML = `<p style="color: var(--accent); grid-column: 1 / -1;">Failed to retrieve job posts.</p>`;
            }
        }

        function searchJobs() {
            const search = document.getElementById('search-title').value;
            const location = document.getElementById('search-location').value;
            const type = document.getElementById('search-type').value;
            loadJobsList(search, location, type);
        }
    </script>
</body>
</html>
