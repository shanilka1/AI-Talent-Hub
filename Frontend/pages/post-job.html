<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Talent Hub - Post a Job</title>
    <link rel="stylesheet" href="/assets/style.css">
    <style>
        .form-container {
            max-width: 680px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <header></header>

    <main>
        <div class="card form-container">
            <h1 style="margin-bottom: 0.5rem;">Create a Job Posting</h1>
            <p class="subtitle" style="margin-bottom: 2rem;">Post a new job and recruit candidate matches ranked by compatibility.</p>

            <form id="form-create-job" onsubmit="handleCreateJob(event)">
                <div class="form-group">
                    <label class="form-label" for="job-title">Job Title</label>
                    <input type="text" id="job-title" class="form-input" placeholder="e.g. Senior ASP.NET Developer" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="job-desc">Job Description</label>
                    <textarea id="job-desc" class="form-input" placeholder="Describe the job role, tasks, and requirements..." required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label" for="job-reqs">Prerequisite Skills (semicolon separated)</label>
                    <input type="text" id="job-reqs" class="form-input" placeholder="e.g. C#;ASP.NET Core;SQL Server;React" required>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem;">Used by the AI Engine to calculate matching scores for candidates.</p>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="job-loc">Location</label>
                        <input type="text" id="job-loc" class="form-input" placeholder="e.g. Colombo, Sri Lanka / Remote" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="job-type">Job Type</label>
                        <select id="job-type" class="form-input" required>
                            <option value="Full-Time" selected>Full-Time</option>
                            <option value="Part-Time">Part-Time</option>
                            <option value="Remote">Remote</option>
                            <option value="Hybrid">Hybrid</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="job-salary">Salary Range</label>
                    <input type="text" id="job-salary" class="form-input" placeholder="e.g. Rs. 150,000 - 250,000 / Month">
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <a href="/pages/recruiter-dashboard.html" class="btn btn-secondary" style="flex: 1;">Cancel</a>
                    <button type="submit" class="btn btn-primary" style="flex: 2;">Post Job Posting</button>
                </div>
            </form>
        </div>
    </main>

    <footer></footer>

    <script src="/services/api.js"></script>
    <script src="/services/auth.js"></script>
    <script src="/services/jobs.js"></script>
    <script src="/components/navbar.js"></script>
    <script src="/components/footer.js"></script>

    <script>
        // Secure access
        if (!authService.isAuthenticated()) {
            window.location.href = '/pages/auth.html';
        } else {
            const user = authService.getCurrentUser();
            if (user && user.role !== 'Recruiter') {
                window.location.href = '/pages/candidate-dashboard.html';
            }
        }

        async function handleCreateJob(e) {
            e.preventDefault();

            const title = document.getElementById('job-title').value;
            const description = document.getElementById('job-desc').value;
            const requirements = document.getElementById('job-reqs').value;
            const location = document.getElementById('job-loc').value;
            const jobType = document.getElementById('job-type').value;
            const salaryRange = document.getElementById('job-salary').value;

            try {
                await jobsService.createJob({
                    title,
                    description,
                    requirements,
                    location,
                    jobType,
                    salaryRange
                });
                alert("Job post created successfully!");
                window.location.href = '/pages/recruiter-dashboard.html';
            } catch (err) {
                alert(`Failed to create job post: ${err.message}`);
            }
        }
    </script>
</body>
</html>
